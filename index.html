<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RoadTrip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#1a1410;--paper:#f5f0e8;--cream:#faf7f2;
  --amber:#c8853a;--amber-l:#e8a85a;--amber-pale:#f5e6cc;
  --sage:#4e7050;--muted:#8a7a6a;--border:#d8cdb8;
  --red:#c03020;--red-pale:#fdecea;
  --ss:0 1px 4px rgba(26,20,16,.10);--sm:0 4px 16px rgba(26,20,16,.14);--sl:0 8px 32px rgba(26,20,16,.22);
  --hh:52px;--tbh:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}

/* ── AUTH SCREEN ── */
.auth-screen{position:fixed;inset:0;z-index:9000;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.5rem}
.auth-screen.hidden{display:none}
.auth-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:2.5rem;color:var(--amber-l)}
.auth-sub{font-size:.85rem;color:rgba(255,255,255,.5);text-align:center;line-height:1.6;max-width:300px}
.auth-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:.75rem}
.auth-input{width:100%;padding:.75rem 1rem;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none}
.auth-input:focus{border-color:var(--amber)}
.auth-input::placeholder{color:rgba(255,255,255,.3)}
.auth-btn{width:100%;padding:.78rem;border-radius:10px;border:none;background:var(--amber);
  color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .18s}
.auth-btn:hover{background:var(--amber-l)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-msg{font-size:.8rem;text-align:center;color:rgba(255,255,255,.6);line-height:1.5}
.auth-msg.ok{color:#6dbb6d}
.auth-msg.err{color:#e06060}

/* ── LOADING SCREEN ── */
.app-loading{position:fixed;inset:0;z-index:8000;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.app-loading.hidden{display:none}
.app-loading .logo{font-family:'Playfair Display',serif;font-style:italic;font-size:2rem;color:var(--amber)}
.app-loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--amber);
  border-radius:50%;animation:spin .8s linear infinite}

/* HEADER */
.hdr{position:fixed;inset:0 0 auto;height:var(--hh);z-index:1000;background:var(--ink);
  display:flex;align-items:center;justify-content:space-between;padding:0 1rem 0 1.25rem;box-shadow:var(--sm)}
.logo{font-family:'Playfair Display',serif;font-style:italic;font-size:1.3rem;color:var(--amber-l);flex-shrink:0}
.hdr-right{display:flex;align-items:center;gap:.5rem}
.dnav{display:none;gap:.15rem}
.dnav-btn{background:none;border:none;color:var(--cream);opacity:.45;padding:.35rem .8rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
  border-radius:5px;transition:all .18s}
.dnav-btn:hover{opacity:.8;background:rgba(255,255,255,.08)}
.dnav-btn.active{opacity:1;background:var(--amber);color:var(--ink)}
.trip-chip{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.28rem .65rem;cursor:pointer}
.trip-chip-name{font-size:.78rem;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:1.1rem;padding:.3rem;transition:color .15s}
.logout-btn:hover{color:rgba(255,255,255,.8)}

/* TAB BAR */
.tbar{position:fixed;inset:auto 0 0;z-index:1000;height:calc(var(--tbh) + env(safe-area-inset-bottom,0px));
  background:var(--ink);display:flex;align-items:flex-start;justify-content:space-around;padding-top:6px;
  border-top:1px solid rgba(255,255,255,.07);box-shadow:0 -2px 20px rgba(26,20,16,.25)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
  cursor:pointer;padding:6px 0;color:rgba(255,255,255,.4);transition:color .18s}
.tb.active{color:var(--amber-l)}
.tb-ico{font-size:1.25rem;line-height:1}
.tb-lbl{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600}

/* CONTENT */
.content{position:fixed;top:var(--hh);left:0;right:0;bottom:calc(var(--tbh) + env(safe-area-inset-bottom,0px));display:flex;overflow:hidden}
.panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.panel.on{display:flex}

/* MAP */
#pMap{z-index:1}
#gmap{flex:1;width:100%;min-height:0}
.map-daybar{position:absolute;top:.7rem;left:.7rem;right:.7rem;z-index:800;
  display:flex;gap:.35rem;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;pointer-events:all}
.map-daybar::-webkit-scrollbar{display:none}
.mdb{flex-shrink:0;background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:20px;
  padding:.35rem .8rem;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;
  white-space:nowrap;box-shadow:var(--ss);transition:all .15s;backdrop-filter:blur(6px)}
.mdb.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.map-loading{position:absolute;inset:0;z-index:50;background:rgba(26,20,16,.55);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--cream)}
.map-loading.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--amber-l);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:.82rem;opacity:.8}

/* INFOWINDOW */
.gm-iw{font-family:'DM Sans',sans-serif;min-width:210px;max-width:260px}
.iw-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:.15rem;line-height:1.25}
.iw-cat{font-size:.68rem;color:var(--muted);margin-bottom:.38rem}
.iw-meta{font-family:'DM Mono',monospace;font-size:.66rem;color:#4a6090;margin-bottom:.5rem;display:flex;gap:.5rem;flex-wrap:wrap}
.iw-btns{display:flex;gap:.35rem;flex-wrap:wrap}
.iw-btn{flex:1;min-width:70px;display:inline-flex;align-items:center;justify-content:center;gap:.22rem;
  padding:.45rem .4rem;border-radius:7px;font-weight:600;font-size:.68rem;text-decoration:none;
  transition:all .15s;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.iw-btn.pri{background:var(--amber);color:var(--ink)}
.iw-btn.pri:hover{background:var(--amber-l)}
.iw-btn.sec{background:#f0f0f0;color:#333}
.iw-btn.sec:hover{background:#e0e0e0}
.iw-btn.danger{background:var(--red-pale);color:var(--red)}
.iw-btn.danger:hover{background:#fbd5d0}

/* ITINERARY */
#pItin{background:var(--cream);overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#pItin::-webkit-scrollbar{width:3px}
#pItin::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hero{background:linear-gradient(135deg,var(--ink) 0%,#2d2318 100%);color:var(--cream);
  padding:1.2rem 1.2rem .95rem;position:relative;overflow:hidden;flex-shrink:0}
.hero::after{content:'🧊';position:absolute;right:.8rem;top:50%;transform:translateY(-50%);font-size:4.5rem;opacity:.07;pointer-events:none}
.hero-lbl{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-l);margin-bottom:.22rem}
.hero-title{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;margin-bottom:.5rem}
.hero-meta{display:flex;gap:.85rem;flex-wrap:wrap}
.hm{font-size:.73rem;opacity:.68;display:flex;align-items:center;gap:.28rem}
.prog-wrap{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-l));transition:width .4s}
.stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);flex-shrink:0;background:var(--cream)}
.st{padding:.72rem .5rem;text-align:center;border-right:1px solid var(--border)}
.st:last-child{border-right:none}
.st-v{font-family:'DM Mono',monospace;font-size:.92rem;font-weight:500;color:var(--amber)}
.st-l{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:.08rem}
.itin-body{padding:.9rem .95rem 1.5rem}
.sec-ttl{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;display:flex;align-items:center;gap:.45rem}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--border)}
.day-block{margin-bottom:1.15rem;animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.day-hdr{display:flex;align-items:center;gap:.55rem;margin-bottom:.55rem}
.day-n{width:27px;height:27px;border-radius:50%;background:var(--ink);color:var(--amber-l);
  display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.65rem;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-name{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-date{font-size:.65rem;color:var(--muted)}
.day-km{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--amber);background:var(--amber-pale);padding:.17rem .48rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.stop{position:relative;padding-left:.95rem;margin-bottom:.38rem}
.stop::before{content:'';position:absolute;left:.26rem;top:1.25rem;bottom:-.38rem;width:1px;background:var(--border)}
.stop:last-child::before{display:none}
.stop::after{content:'';position:absolute;left:.04rem;top:.5rem;width:.4rem;height:.4rem;border-radius:50%;
  background:var(--amber);border:2px solid var(--cream);box-shadow:0 0 0 1px var(--amber)}
.transit{display:inline-flex;align-items:center;gap:.22rem;padding:.16rem .48rem;border-radius:20px;
  font-size:.62rem;font-family:'DM Mono',monospace;margin-bottom:.32rem;margin-left:.1rem;border:1px solid;
  background:#eef2fa;border-color:#b8c8e8;color:#4a6090}
.sc{background:white;border:1px solid var(--border);border-radius:10px;padding:.62rem .85rem;
  transition:all .18s;box-shadow:var(--ss);-webkit-user-select:none;user-select:none}
.sc.active{border-color:var(--amber);background:#fffdf8;box-shadow:0 0 0 3px var(--amber-pale)}
.sc-top{display:flex;align-items:flex-start;gap:.45rem;margin-bottom:.18rem;cursor:pointer}
.sc-ico{font-size:.9rem;flex-shrink:0}
.sc-name{font-weight:600;font-size:.82rem;flex:1;line-height:1.3}
.sc-time{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--muted);white-space:nowrap}
.sc-cat{font-size:.65rem;color:var(--muted);margin-bottom:.3rem}
.sc-actions{display:flex;gap:.3rem;margin-top:.5rem;padding-top:.4rem;border-top:1px dashed var(--border)}
.sc-btn{display:inline-flex;align-items:center;gap:.2rem;padding:.3rem .6rem;border-radius:6px;
  font-size:.65rem;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.sc-btn.edit{background:var(--amber-pale);color:var(--amber)}
.sc-btn.edit:hover{background:#ecd8b0}
.sc-btn.del{background:var(--red-pale);color:var(--red)}
.sc-btn.del:hover{background:#fbd5d0}
.sc-btn.gmaps{background:#f0f4ff;color:#3050a0;margin-left:auto}
.sc-btn.gmaps:hover{background:#e0e8ff}
.acts{border-top:1px dashed var(--border);padding-top:.35rem;margin-top:.32rem;display:flex;flex-direction:column;gap:.25rem}
.act{display:flex;align-items:center;gap:.45rem;min-height:26px}
.ach{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ach-i{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:white}
.ach:hover .ach-i{border-color:var(--amber)}
.ach.chk .ach-i{background:var(--sage);border-color:var(--sage)}
.ach.chk .ach-i::after{content:'✓';font-size:.6rem;color:white;font-weight:700}
.act-t{font-size:.76rem;flex:1;line-height:1.3}
.act-t.done{text-decoration:line-through;color:var(--muted)}
.act-h{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);white-space:nowrap}
.add-stop-btn{display:flex;align-items:center;justify-content:center;gap:.4rem;
  width:100%;padding:.6rem;border:1.5px dashed var(--border);border-radius:10px;
  background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;
  color:var(--muted);transition:all .18s;margin-top:.2rem}
.add-stop-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-pale)}

/* OVERVIEW */
#pOver{background:var(--cream);overflow-y:auto;-webkit-overflow-scrolling:touch}
.over-body{padding:.9rem .95rem 1.5rem}
.trip-card{background:white;border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;
  margin-bottom:.65rem;cursor:pointer;transition:all .18s;box-shadow:var(--ss)}
.trip-card:active{transform:scale(.98)}
.trip-card.active{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-pale)}
.tc-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:.28rem}
.tc-meta{font-size:.72rem;color:var(--muted);display:flex;gap:.65rem;flex-wrap:wrap}

/* saving indicator */
.save-toast{position:fixed;bottom:calc(var(--tbh) + env(safe-area-inset-bottom,0px) + .75rem);
  left:50%;transform:translateX(-50%);z-index:5000;
  background:var(--ink);color:var(--cream);border-radius:20px;
  padding:.4rem 1rem;font-size:.75rem;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.save-toast.show{opacity:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(26,20,16,.6);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s}
.modal-overlay.open{opacity:1;pointer-events:all}
@media(min-width:480px){.modal-overlay{align-items:center;padding:1rem}}
.modal{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom,0px));
  transform:translateY(30px);transition:transform .25s;max-height:92vh;overflow-y:auto}
@media(min-width:480px){.modal{border-radius:16px;transform:translateY(0) scale(.97);max-height:80vh}}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1rem;display:block}
@media(min-width:480px){.modal-handle{display:none}}
.modal-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:1rem}
.modal-field{margin-bottom:.85rem}
.modal-field label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:.3rem}
.modal-field input,.modal-field select{width:100%;padding:.6rem .75rem;border:1.5px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:.88rem;background:white;color:var(--ink);outline:none;transition:border-color .15s}
.modal-field input:focus,.modal-field select:focus{border-color:var(--amber)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.modal-actions{display:flex;gap:.5rem;margin-top:1.1rem}
.modal-btn{flex:1;padding:.7rem;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;border:none;cursor:pointer;transition:all .18s}
.modal-btn.cancel{background:var(--paper);color:var(--muted)}
.modal-btn.cancel:hover{background:var(--border)}
.modal-btn.save{background:var(--amber);color:var(--ink)}
.modal-btn.save:hover{background:var(--amber-l)}
.modal-btn:disabled{opacity:.5;cursor:not-allowed}
.search-wrap{position:relative}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;
  border:1.5px solid var(--border);border-radius:8px;box-shadow:var(--sm);z-index:10;
  max-height:200px;overflow-y:auto;display:none}
.search-results.open{display:block}
.sr-item{padding:.6rem .75rem;cursor:pointer;font-size:.84rem;border-bottom:1px solid var(--paper);transition:background .12s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--amber-pale)}
.sr-main{font-weight:500}
.sr-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.pos-picker{display:flex;flex-direction:column;gap:0;max-height:150px;overflow-y:auto;
  border:1.5px solid var(--border);border-radius:8px;background:white}
.pos-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;cursor:pointer;
  font-size:.82rem;transition:background .12s;border-bottom:1px solid var(--paper)}
.pos-item:last-child{border-bottom:none}
.pos-item:hover{background:var(--amber-pale)}
.pos-item.selected{background:var(--amber-pale);font-weight:600}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;z-index:3000;background:rgba(26,20,16,.65);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;
  opacity:0;pointer-events:none;transition:opacity .18s}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:var(--cream);border-radius:16px;padding:1.5rem;max-width:320px;width:100%;text-align:center}
.confirm-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:.4rem}
.confirm-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.1rem;line-height:1.5}
.confirm-acts{display:flex;gap:.5rem}
.confirm-btn{flex:1;padding:.65rem;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;transition:all .18s}
.confirm-btn.no{background:var(--paper);color:var(--muted)}
.confirm-btn.yes{background:var(--red);color:white}

/* NEW TRIP BTN */
.new-trip-btn{display:flex;align-items:center;justify-content:center;gap:.4rem;
  width:100%;padding:.75rem;border:1.5px dashed var(--border);border-radius:12px;
  background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;
  color:var(--muted);transition:all .18s;margin-top:.25rem}
.new-trip-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-pale)}
.tc-actions{display:flex;gap:.4rem;margin-top:.55rem;padding-top:.45rem;border-top:1px dashed var(--border)}
.tc-btn{display:inline-flex;align-items:center;gap:.2rem;padding:.3rem .65rem;border-radius:6px;
  font-size:.66rem;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.tc-btn.open{background:var(--amber-pale);color:var(--amber)}
.tc-btn.open:hover{background:#ecd8b0}
.tc-btn.del{background:var(--red-pale);color:var(--red)}
.tc-btn.del:hover{background:#fbd5d0}

/* DESKTOP */
@media(min-width:720px){
  .tbar{display:none}
  .dnav{display:flex}
  .content{bottom:0;flex-direction:row}
  .content.vs #pItin{display:flex;position:relative;width:390px;min-width:390px;border-right:1px solid var(--border);flex-shrink:0}
  .content.vs #pMap{display:flex;position:relative;flex:1}
  .content.vm #pMap{display:flex;position:relative;flex:1}
  .content.vl #pItin{display:flex;position:relative;flex:1}
  .content.vo #pOver{display:flex;position:relative;flex:1}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-logo">RoadTrip</div>
  <div class="auth-sub">Accedi al tuo account.</div>
  <div class="auth-form">
    <input class="auth-input" type="email" id="authEmail" placeholder="Email" onkeydown="if(event.key==='Enter')doLogin()">

async function dbSaveStop(stop, dayId, position){
  const payload = {
    day_id: dayId,
    name: stop.name, icon: stop.icon, cat: stop.cat,
    lat: stop.lat, lng: stop.lng, time: stop.time,
    transit_km: stop.transit?.km||null,
    transit_dur: stop.transit?.dur||null,
    position
  };
  if(stop.id && !stop.id.startsWith('_new_')){
    const {error} = await sb.from('stops').update(payload).eq('id', stop.id);
    if(error) console.error(error);
  } else {
    const {data, error} = await sb.from('stops').insert(payload).select().single();
    if(error){ console.error(error); return null; }
    return data.id;
  }
  return stop.id;
}

async function dbDeleteStop(stopId){
  const {error} = await sb.from('stops').delete().eq('id', stopId);
  if(error) console.error(error);
}

async function dbReorderStops(dayId, stops){
  for(let i=0;i<stops.length;i++){

}

function guessIcon(name,cat){
  const n=(name+' '+cat).toLowerCase();
  if(n.includes('aeroporto')||n.includes('airport')) return '✈️';
  if(n.includes('hotel')||n.includes('pernottamento')||n.includes('cabin')||n.includes('hostel')) return '🏨';
  if(n.includes('foss')||n.includes('cascata')||n.includes('waterfall')) return '💧';
  if(n.includes('beach')||n.includes('spiaggia')) return '🏖️';
  if(n.includes('jökul')||n.includes('glaci')) return '🧊';
  if(n.includes('geysir')||n.includes('geyser')) return '💨';
  if(n.includes('vulcan')||n.includes('fagradals')||n.includes('kerid')) return '🌋';
  if(n.includes('mountain')||n.includes('montagna')||n.includes('kirkjufell')) return '⛰️';
  if(n.includes('church')||n.includes('chiesa')||n.includes('kirkja')) return '⛪';
  if(n.includes('ristorante')||n.includes('restaurant')) return '🍽️';
  if(n.includes('canyon')||n.includes('gjúfur')) return '🏔️';
  if(n.includes('seal')||n.includes('foca')) return '🦭';
  if(n.includes('plane')||n.includes('wreck')) return '🛩️';
  return '📍';
}

function findStop(id){ for(const d of TRIPS[ti].days) for(const s of d.stops) if(s.id===id) return s; return null; }
function findStopIdx(id){
  for(let di=0;di<TRIPS[ti].days.length;di++)
    for(let si=0;si<TRIPS[ti].days[di].stops.length;si++)
      if(TRIPS[ti].days[di].stops[si].id===id) return {di,si};
  return {di:-1,si:-1};
}

  </svg>`;
  return {url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),
    scaledSize:new google.maps.Size(size,size),anchor:new google.maps.Point(size/2,size/2)};
}

function iwContent(stop, di, si){
  const gdir=`https://www.google.com/maps/dir/?api=1&destination=${stop.lat},${stop.lng}`;
  const meta=stop.transit?`<div class="iw-meta"><span>📍 ${stop.transit.km}</span><span>⏱ ${stop.transit.dur}</span></div>`:'';
  return `<div class="gm-iw">
    <div class="iw-name">${stop.icon} ${stop.name}</div>
    <div class="iw-cat">${stop.cat} · ${stop.time}</div>
    ${meta}
    <div class="iw-btns">
      <a href="${gdir}" target="_blank" class="iw-btn pri">🧭 Indicazioni</a>
      <button class="iw-btn sec" onclick="openEditModal(${di},${si})">✏️ Modifica</button>
      <button class="iw-btn danger" onclick="askDelete(${di},${si})">🗑</button>
    </div>
  </div>`;
}

function renderMap(){
  if(!gmap||!TRIPS.length) return;
  Object.values(markers).forEach(m=>m.setMap(null)); markers={};
  polylines.forEach(p=>p.setMap(null)); polylines=[];
  iw.close();
  const trip=TRIPS[ti];
  const bounds=new google.maps.LatLngBounds();
  let done=0, total=0;
  trip.days.forEach((day,di)=>{ if(dayF!=='all'&&dayF!==di) return; total+=Math.max(0,day.stops.length-1); });
  document.getElementById('mapLoading').classList.remove('hidden');

  trip.days.forEach((day,di)=>{
    if(dayF!=='all'&&dayF!==di) return;
    const color=DAY_COLORS[di%DAY_COLORS.length];
    day.stops.forEach((stop,si)=>{
      const ll=new google.maps.LatLng(stop.lat,stop.lng);
      bounds.extend(ll);
      const marker=new google.maps.Marker({
        position:ll, map:gmap, icon:markerIcon(stop,stop.id===activeId),
        zIndex:stop.id===activeId?10:1, title:stop.name
      });
      marker.addListener('click',()=>{ focusStop(stop.id,false); iw.setContent(iwContent(stop,di,si)); iw.open(gmap,marker); });
      markers[stop.id]=marker;
    });
    day.stops.forEach((stop,si)=>{
      if(si===0) return;
      const prev=day.stops[si-1];
      directionsService.route({
        origin:{lat:prev.lat,lng:prev.lng},
        destination:{lat:stop.lat,lng:stop.lng},
        travelMode:google.maps.TravelMode.DRIVING
      },(result,status)=>{
        if(status==='OK'){
          polylines.push(new google.maps.Polyline({
            path:result.routes[0].overview_path,
            geodesic:false, strokeColor:color, strokeOpacity:.85, strokeWeight:3.5, map:gmap
          }));
        }
        done++;
        if(done>=total) document.getElementById('mapLoading').classList.add('hidden');
      });
    });
  });
  if(total===0) document.getElementById('mapLoading').classList.add('hidden');
  if(!bounds.isEmpty()) gmap.fitBounds(bounds,{padding:50});
}

function renderDayBar(){
  if(!TRIPS.length) return;
  const bar=document.getElementById('mapDaybar'); bar.innerHTML='';
  const trip=TRIPS[ti];
  const make=(v,lbl)=>{
    const b=document.createElement('button');
    b.className='mdb'+(dayF===v?' active':'');
    b.textContent=lbl;
    b.onclick=()=>{ dayF=v; renderDayBar(); renderMap(); };
    bar.appendChild(b);
  };
  make('all','Tutti i giorni');
  trip.days.forEach((_,i)=>make(i,`G${i+1}`));
}

function focusStop(id, scroll){
  activeId=id;
  document.querySelectorAll('.sc').forEach(e=>e.classList.remove('active'));
  const card=document.getElementById('c-'+id);
  if(card){card.classList.add('active');if(scroll)card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  Object.entries(markers).forEach(([mid,m])=>m.setIcon(markerIcon(findStop(mid),mid===id)));
  if(markers[id]){ const s=findStop(id); const {di,si}=findStopIdx(id); iw.setContent(iwContent(s,di,si)); iw.open(gmap,markers[id]); }
}

/* ═══════════════════════════════════════
   ITINERARY
═══════════════════════════════════════ */
function renderItin(){
  if(!TRIPS.length){ document.getElementById('itinBody').innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted)">Nessun viaggio trovato.</div>'; return; }
  const trip=TRIPS[ti];
  const body=document.getElementById('itinBody');
  body.innerHTML='<div class="sec-ttl">Itinerario dettagliato</div>';
  trip.days.forEach((day,di)=>{
    const el=document.createElement('div');
    el.className='day-block'; el.style.animationDelay=(di*.05)+'s';
    const km=day.dayKm>0?`${day.dayKm}km · ${day.dayTime}`:'Arrivo';
    el.innerHTML=`<div class="day-hdr">
      <div class="day-n">${di+1}</div>
      <div class="day-info"><div class="day-name">${day.name}</div><div class="day-date">${day.date}</div></div>
      <div class="day-km">${km}</div>
    </div>`;
    day.stops.forEach((stop,si)=>{
      const tr=stop.transit?`<div class="transit">🚗 ${stop.transit.km} · ${stop.transit.dur}</div>`:'';
      const se=document.createElement('div');
      se.className='stop';
      se.innerHTML=`${tr}
        <div class="sc ${stop.id===activeId?'active':''}" id="c-${stop.id}">
          <div class="sc-top" onclick="focusStop('${stop.id}',false);if(window.innerWidth<720)mtab('map')">
            <span class="sc-ico">${stop.icon}</span>
            <span class="sc-name">${stop.name}</span>
            <span class="sc-time">${stop.time}</span>
          </div>
          <div class="sc-cat">${stop.cat}</div>
          <div class="sc-actions">
            <button class="sc-btn edit" onclick="openEditModal(${di},${si})">✏️ Modifica</button>
            <button class="sc-btn del" onclick="askDelete(${di},${si})">🗑 Elimina</button>
            <a href="https://www.google.com/maps/dir/?api=1&destination=${stop.lat},${stop.lng}" target="_blank" class="sc-btn gmaps">🧭 Maps</a>
          </div>
        </div>`;
      el.appendChild(se);
    });
    const addBtn=document.createElement('button');
    addBtn.className='add-stop-btn';
    addBtn.innerHTML='+ Aggiungi tappa';
    addBtn.onclick=()=>openAddModal(di);
    el.appendChild(addBtn);
    body.appendChild(el);
  });
}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
function openAddModal(di){
  modalMode='add'; modalDayIdx=di; modalStopIdx=-1;
  pendingLat=null; pendingLng=null;
  document.getElementById('modalTitle').textContent='Aggiungi tappa';
  document.getElementById('searchInput').value='';
  document.getElementById('fName').value='';
  document.getElementById('fCat').value='';
  document.getElementById('fTime').value='10:00';
  document.getElementById('fKm').value='';
  document.getElementById('fDur').value='';
  document.getElementById('searchResults').classList.remove('open');
  populateDaySelect(di);
  modalPosIdx = TRIPS[ti].days[di].stops.length;
  renderPosPicker();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),300);
}

function openEditModal(di,si){
  modalMode='edit'; modalDayIdx=di; modalStopIdx=si;
  const stop=TRIPS[ti].days[di].stops[si];
  pendingLat=stop.lat; pendingLng=stop.lng;
  document.getElementById('modalTitle').textContent='Modifica tappa';
  document.getElementById('searchInput').value=stop.name;
  document.getElementById('fName').value=stop.name;
  document.getElementById('fCat').value=stop.cat;
  document.getElementById('fTime').value=stop.time;
  document.getElementById('fKm').value=stop.transit?.km||'';
  document.getElementById('fDur').value=stop.transit?.dur||'';
  document.getElementById('searchResults').classList.remove('open');
  populateDaySelect(di);
  modalPosIdx=si;
  renderPosPicker();
  document.getElementById('modalOverlay').classList.add('open');
  iw && iw.close();
}

function populateDaySelect(selectedDi){
  const sel=document.getElementById('fDay'); sel.innerHTML='';
  TRIPS[ti].days.forEach((day,i)=>{
    const opt=document.createElement('option');
    opt.value=i; opt.textContent=`G${i+1} — ${day.name}`;
    if(i===selectedDi) opt.selected=true;
    sel.appendChild(opt);
  });
  modalDayIdx=selectedDi;
}

function renderPosPicker(){
  modalDayIdx=parseInt(document.getElementById('fDay').value);
  const day=TRIPS[ti].days[modalDayIdx];
  const picker=document.getElementById('posPicker'); picker.innerHTML='';
  const positions=[{label:'In cima al giorno', idx:0}];
  day.stops.forEach((s,i)=>positions.push({label:`Dopo: ${s.icon} ${s.name}`, idx:i+1}));
  if(modalPosIdx<0) modalPosIdx=positions[positions.length-1].idx;
  positions.forEach(p=>{
    const row=document.createElement('div');
    row.className='pos-item'+(p.idx===modalPosIdx?' selected':'');
    row.innerHTML=p.label;
    row.onclick=()=>{ modalPosIdx=p.idx; picker.querySelectorAll('.pos-item').forEach(r=>r.classList.remove('selected')); row.classList.add('selected'); };
    picker.appendChild(row);
  });
}

function onSearchInput(){
  clearTimeout(searchTimer);
  const q=document.getElementById('searchInput').value.trim();
  if(q.length<3){ document.getElementById('searchResults').classList.remove('open'); return; }
  searchTimer=setTimeout(()=>{
    autocompleteService.getPlacePredictions({input:q,language:'it'},(predictions,status)=>{
      const box=document.getElementById('searchResults'); box.innerHTML='';
      if(status!==google.maps.places.PlacesServiceStatus.OK||!predictions){ box.classList.remove('open'); return; }
      predictions.slice(0,5).forEach(p=>{
        const item=document.createElement('div');
        item.className='sr-item';
        item.innerHTML=`<div class="sr-main">${p.structured_formatting.main_text}</div>
          <div class="sr-sub">${p.structured_formatting.secondary_text||''}</div>`;
        item.onclick=()=>{
          box.classList.remove('open');
          document.getElementById('searchInput').value=p.description;
          document.getElementById('fName').value=p.structured_formatting.main_text;
          placesService.getDetails({placeId:p.place_id,fields:['geometry','name','types']},(place,s)=>{
            if(s===google.maps.places.PlacesServiceStatus.OK){
              pendingLat=place.geometry.location.lat();
              pendingLng=place.geometry.location.lng();
              if(!document.getElementById('fCat').value)
                document.getElementById('fCat').value=(place.types?.[0]||'').replace(/_/g,' ');
            }
          });
        };
        box.appendChild(item);
      });
      box.classList.add('open');
    });
  },300);
}

async function saveStop(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ alert('Inserisci il nome della tappa.'); return; }
  if(!pendingLat||!pendingLng){ alert('Seleziona un luogo dalla lista di ricerca.'); return; }
  const cat=document.getElementById('fCat').value.trim()||'Tappa';
  const time=document.getElementById('fTime').value||'00:00';
  const km=document.getElementById('fKm').value.trim();
  const dur=document.getElementById('fDur').value.trim();
  const transit=(km||dur)?{km:km||'—',dur:dur||'—'}:null;
  const icon=guessIcon(name,cat);
  const btn=document.getElementById('modalSaveBtn');
  btn.disabled=true; btn.textContent='Salvataggio…';

  const targetDi=parseInt(document.getElementById('fDay').value);
  const targetDay=TRIPS[ti].days[targetDi];
  const pos=modalPosIdx>=0?modalPosIdx:targetDay.stops.length;

  if(modalMode==='add'){
    const stop={id:'_new_', name, icon, cat, lat:pendingLat, lng:pendingLng, time, transit, acts:[]};
    targetDay.stops.splice(pos,0,stop);
    // save to DB
    const newId=await dbSaveStop(stop, targetDay.id, pos);
    if(newId) stop.id=newId;
    // reorder remaining
    for(let i=pos+1;i<targetDay.stops.length;i++)
      await sb.from('stops').update({position:i}).eq('id',targetDay.stops[i].id);
    activeId=stop.id;
  } else {
    const stop=TRIPS[ti].days[modalDayIdx].stops[modalStopIdx];
    stop.name=name; stop.icon=icon; stop.cat=cat;
    stop.lat=pendingLat; stop.lng=pendingLng;
    stop.time=time; stop.transit=transit;
    // move if day/position changed
    if(targetDi!==modalDayIdx||pos!==modalStopIdx){
      TRIPS[ti].days[modalDayIdx].stops.splice(modalStopIdx,1);
      TRIPS[ti].days[targetDi].stops.splice(pos>modalStopIdx?pos-1:pos,0,stop);
      await sb.from('stops').update({day_id:targetDay.id}).eq('id',stop.id);
      await dbReorderStops(targetDay.id, TRIPS[ti].days[targetDi].stops);
      if(targetDi!==modalDayIdx)
        await dbReorderStops(TRIPS[ti].days[modalDayIdx].id, TRIPS[ti].days[modalDayIdx].stops);
    }
    await dbSaveStop(stop, targetDay.id, pos);
    activeId=stop.id;
  }

  btn.disabled=false; btn.textContent='Salva tappa';
  closeModal();
  renderAll();
  showToast('💾 Tappa salvata');
  setTimeout(()=>focusStop(activeId,true),200);
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('searchResults').classList.remove('open');
}

/* ═══════════════════════════════════════
   DELETE
═══════════════════════════════════════ */
function askDelete(di,si){
  pendingDeleteDi=di; pendingDeleteSi=si;
  const stop=TRIPS[ti].days[di].stops[si];
  document.getElementById('confirmSub').textContent=`Vuoi eliminare "${stop.name}"?`;
  document.getElementById('confirmOverlay').classList.add('open');
  iw && iw.close();
}
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('open'); }
async function doDelete(){
  if(pendingDeleteDi===null) return;
  const stop=TRIPS[ti].days[pendingDeleteDi].stops[pendingDeleteSi];
  if(activeId===stop.id) activeId=null;
  TRIPS[ti].days[pendingDeleteDi].stops.splice(pendingDeleteSi,1);
  closeConfirm();
  await dbDeleteStop(stop.id);
  showToast('🗑 Tappa eliminata');
  renderAll();
}

/* ═══════════════════════════════════════
   STATS / OVERVIEW
═══════════════════════════════════════ */
function updStats(){
  if(!TRIPS.length) return;
  const trip=TRIPS[ti];
  document.getElementById('hTitle').textContent=trip.title;
  document.getElementById('hDates').textContent=trip.dates;
  document.getElementById('hPersons').textContent=trip.persons;
  document.getElementById('hStops').textContent=trip.days.flatMap(d=>d.stops).length+' tappe';
  document.getElementById('sKm').textContent=trip.totalKm;
  document.getElementById('sTime').textContent=trip.totalTime;
  document.getElementById('chipName').textContent=trip.title;
  document.getElementById('sDone').textContent='0%';
}

function renderOver(){
  const body=document.getElementById('overBody');
  body.innerHTML='<div class="sec-ttl" style="margin-top:.2rem">I tuoi viaggi</div>';
  if(!TRIPS.length){ body.innerHTML+='<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:2rem 0 1rem">Nessun viaggio. Creane uno!</div>'; }
  TRIPS.forEach((trip,i)=>{
    const c=document.createElement('div');
    c.className='trip-card'+(i===ti?' active':'');
    c.innerHTML=`<div class="tc-title">${trip.title}</div>
      <div class="tc-meta"><span>📅 ${trip.dates}</span><span>👥 ${trip.persons}</span>
      <span>📍 ${trip.days.flatMap(d=>d.stops).length} tappe</span></div>
      <div class="tc-actions">
        <button class="tc-btn open" onclick="event.stopPropagation();selectTrip(${i})">↗ Apri</button>
        <button class="tc-btn del" onclick="event.stopPropagation();askDeleteTrip(${i})">🗑 Elimina</button>
      </div>`;
    c.onclick=()=>selectTrip(i);
    body.appendChild(c);
  });
  // New trip button
  const nb=document.createElement('button');
  nb.className='new-trip-btn';
  nb.innerHTML='+ Nuovo viaggio';
  nb.onclick=openTripModal;
  body.appendChild(nb);
}

function selectTrip(i){
  ti=i; activeId=null; dayF='all'; renderAll();
  if(window.innerWidth<720) mtab('itinerary'); else dv('split');
}

/* ═══════════════════════════════════════
   TRIP MODAL — ADD
═══════════════════════════════════════ */
function openTripModal(){
  document.getElementById('tTitle').value='';
  document.getElementById('tDates').value='';
  document.getElementById('tPersons').value='';
  document.getElementById('tKm').value='';
  document.getElementById('tTime').value='';
  document.getElementById('tripModalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('tTitle').focus(),300);
}

function closeTripModal(e){
  if(e&&e.target!==document.getElementById('tripModalOverlay')) return;
  document.getElementById('tripModalOverlay').classList.remove('open');
}

async function saveNewTrip(){
  const title=document.getElementById('tTitle').value.trim();
  if(!title){ alert('Inserisci un titolo per il viaggio.'); return; }
  const btn=document.getElementById('tripSaveBtn');
  btn.disabled=true; btn.textContent='Creazione…';

  const {data:trip, error}=await sb.from('trips').insert({
    user_id: currentUser.id,
    title,
    dates: document.getElementById('tDates').value.trim(),
    persons: document.getElementById('tPersons').value.trim(),
    total_km: document.getElementById('tKm').value.trim(),
    total_time: document.getElementById('tTime').value.trim()
  }).select().single();

  btn.disabled=false; btn.textContent='Crea viaggio';

  if(error){ showToast('❌ Errore: '+error.message); return; }

  // Add a default Day 1
  await sb.from('days').insert({
    trip_id: trip.id,
    name: 'Giorno 1',
    date: '',
    day_km: 0,
    day_time: '',
    position: 0
  });

  await loadTrips();
  ti = TRIPS.findIndex(t=>t.id===trip.id);
  if(ti<0) ti=TRIPS.length-1;
  activeId=null; dayF='all';
  closeTripModal();
  renderAll();
  showToast('✈️ Viaggio creato!');
  if(window.innerWidth<720) mtab('itinerary'); else dv('split');
}

/* ═══════════════════════════════════════
   TRIP DELETE
═══════════════════════════════════════ */
let pendingDeleteTripIdx = null;

function askDeleteTrip(i){
  pendingDeleteTripIdx=i;
  const trip=TRIPS[i];
  document.getElementById('confirmSub').textContent=
    `Vuoi eliminare "${trip.title}" con tutti i suoi giorni e tappe? L'azione non è reversibile.`;
  document.getElementById('confirmOverlay').classList.add('open');
}

// Override doDelete to handle both stop and trip deletion
const _doDeleteStop = doDelete;
async function doDelete(){
  if(pendingDeleteTripIdx!==null){
    const trip=TRIPS[pendingDeleteTripIdx];
    const {error}=await sb.from('trips').delete().eq('id',trip.id);
    if(error){ showToast('❌ Errore: '+error.message); closeConfirm(); return; }
    TRIPS.splice(pendingDeleteTripIdx,1);
    if(ti>=TRIPS.length) ti=Math.max(0,TRIPS.length-1);
    pendingDeleteTripIdx=null;
    closeConfirm();
    renderAll();
    showToast('🗑 Viaggio eliminato');
    if(!TRIPS.length){ if(window.innerWidth<720) mtab('overview'); else dv('overview'); }
    return;
  }
  // stop delete
  if(pendingDeleteDi===null) return;
  const stop=TRIPS[ti].days[pendingDeleteDi].stops[pendingDeleteSi];
  if(activeId===stop.id) activeId=null;
  TRIPS[ti].days[pendingDeleteDi].stops.splice(pendingDeleteSi,1);
  closeConfirm();
  await dbDeleteStop(stop.id);
  showToast('🗑 Tappa eliminata');
  renderAll();
}

/* ═══════════════════════════════════════
   VIEW SWITCHING
═══════════════════════════════════════ */
function mtab(tab){
  ['tbOver','tbItin','tbMap'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById({overview:'tbOver',itinerary:'tbItin',map:'tbMap'}[tab]).classList.add('active');
  ['pMap','pItin','pOver'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById({overview:'pOver',itinerary:'pItin',map:'pMap'}[tab]).classList.add('on');
  if(tab==='map'&&gmap) setTimeout(()=>google.maps.event.trigger(gmap,'resize'),50);
}

function dv(mode){
  document.getElementById('content').className='content v'+mode[0];
  document.querySelectorAll('.dnav-btn').forEach((b,i)=>
    b.classList.toggle('active',['overview','split','map','list'][i]===mode));
  ['pMap','pItin','pOver'].forEach(id=>document.getElementById(id).classList.remove('on'));
  if(mode==='split'){
    document.getElementById('pMap').classList.add('on');
    document.getElementById('pItin').classList.add('on');
  } else {
    document.getElementById({overview:'pOver',map:'pMap',list:'pItin'}[mode]).classList.add('on');
  }
  if(gmap) setTimeout(()=>google.maps.event.trigger(gmap,'resize'),80);
}

function renderAll(){ updStats(); renderItin(); renderDayBar(); renderOver(); renderMap(); }

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
async function startApp(user){
  currentUser = user;
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appLoading').classList.remove('hidden');

  await loadTrips();

  // First login: seed Iceland data
  if(TRIPS.length === 0){
    await seedIceland();
    await loadTrips();
  }

  document.getElementById('appLoading').classList.add('hidden');

  if(window.innerWidth>=720) dv('split'); else mtab('itinerary');
  updStats(); renderItin(); renderDayBar(); renderOver();

  // Load Google Maps
  const script=document.createElement('script');
  script.src=`https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&callback=initGoogleMaps&libraries=places`;
  script.async=true; script.defer=true;
  document.head.appendChild(script);

  window.addEventListener('resize',()=>{ if(gmap) google.maps.event.trigger(gmap,'resize'); });
}

window.addEventListener('DOMContentLoaded', async ()=>{
  const {data:{session}, error} = await sb.auth.getSession();

  if(session?.user){
    startApp(session.user);
  } else {
    document.getElementById('appLoading').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
  }

  sb.auth.onAuthStateChange((_event, session)=>{
    if(session?.user && !currentUser){
      startApp(session.user);
    }
  });
});
</script>
